# LoRA SFT of HauhauCS/Qwen3.5-4B-Uncensored-HauhauCS-Aggressive.
# Same data philosophy as lrd-reason (philosophy raw text + COT_SYSTEM_PROMPT
# traces) but a standalone, shallow track — no recurrent/diffusion modules.
#
# VRAM expectations (bf16 LoRA, packing=True, seq=2048, batch=8, accum=2):
#   ~30–40 GB on a single A100 80GB. Effective batch = 16 (unchanged).
#   For a 24GB card, drop batch to 1, accum to 16, and re-enable grad_checkpointing.

model_id: HauhauCS/Qwen3.5-4B-Uncensored-HauhauCS-Aggressive
trust_remote_code: true

output_dir: runs/finetune_uncensored
seed: 1337
max_seq_len: 2048
per_device_batch_size: 8
grad_accum_steps: 2
num_train_epochs: 2.0
lr: 2.0e-4
weight_decay: 0.0
warmup_ratio: 0.03
lr_scheduler: cosine
grad_checkpointing: false
log_every: 25
save_every: 500
bf16: true
quantize_4bit: false

lora_r: 32
lora_alpha: 32
lora_dropout: 0.05
lora_targets:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

train_jsonl: data/uncensored_sft.jsonl
eval_jsonl: null
pack_raw_with_eos: true
